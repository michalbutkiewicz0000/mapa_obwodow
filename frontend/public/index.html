<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa obwodów wyborczych — Kraków</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1>Mapa obwodów</h1>
        <p id="city-name" class="subtitle">Kraków</p>

        <label for="election">Wybory</label>
        <select id="election"></select>

        <label for="metric">Kolorowanie</label>
        <select id="metric">
          <option value="frekwencja">Frekwencja</option>
          <option value="winner">Zwycięzca / lista</option>
        </select>

        <div id="stats" class="stats"></div>
        <div id="legend" class="legend"></div>
      </aside>
      <main id="map" class="map"></main>
    </div>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
