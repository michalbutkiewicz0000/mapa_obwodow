<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa obwodów wyborczych</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1>Mapa obwodów</h1>
        <p id="context-name" class="subtitle">Polska</p>
        <button type="button" id="back-to-country" class="back-btn" style="display: none">
          ← Powrót do mapy Polski
        </button>

        <label for="election">Wybory</label>
        <select id="election"></select>

        <label for="metric">Kolorowanie</label>
        <select id="metric">
          <option value="frekwencja">Frekwencja</option>
          <option value="winner">Zwycięzca / lista</option>
        </select>

        <div id="stats" class="stats"></div>
        <div id="legend" class="legend"></div>
      </aside>
      <main id="map" class="map"></main>
    </div>
    <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/pmtiles@3/dist/pmtiles.js"></script>
    <script src="app.js"></script>
  </body>
</html>
